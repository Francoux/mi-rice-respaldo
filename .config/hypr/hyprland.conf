#################
### AUTOSTART ###
#################
# IMPORTANTE: Ponemos esto PRIMERO para que siempre cargue.
exec-once = swww-daemon > /dev/null 2>&1 &
exec-once = waybar > /dev/null 2>&1 &
exec-once = /home/franco/.config/hypr/cambiar_fondo.sh > /dev/null 2>&1 &
exec-once = hypridle
exec-once = swaync
exec-once = nm-applet --indicator &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# 1. ESTILOS Y COLORES (Pywal)
source = ~/.cache/wal/colors-hyprland

################
### MONITORS ###
################
monitor=,highres@highrr,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = thunar
$menu = wofi
$browser = brave
$wallpaper_changer = waypaper
$lock_screen = hyprlock

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = ELECTRON_OZONE_PLATFORM_HINT,auto

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# --- MOVER Y REDIMENSIONAR CON MOUSE ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, L, exec, $lock_screen
bind = $mainMod, W, exec, $wallpaper_changer
bind = $mainMod, M, exec, flatpak run com.spotify.Client
bind = $mainMod, G, exec, steam
bind = $mainMod, N, exec, notion-app

bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, V, togglefloating
bind = $mainMod, J, togglesplit



# Capturas de pantalla
bind = , Print, exec, /home/franco/.config/hypr/capture.sh
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d -c ffffffff -b 000000aa -w 2)" - | wl-copy

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Movimiento a Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Foco y Multimedia
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = ALT SHIFT, Tab, cyclenext, prev

bindel = , XF86AudioRaiseVolume, exec, pamixer -i 10 > /dev/null 2>&1
bindel = , XF86AudioLowerVolume, exec, pamixer -d 10 > /dev/null 2>&1
bindl  = , XF86AudioMute, exec, pamixer -t > /dev/null 2>&1
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 10%+ > /dev/null 2>&1
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%- > /dev/null 2>&1
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

#####################
### LOOK AND FEEL ###
#####################
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  # Recuperamos tus colores
  col.active_border = $color12
  col.inactive_border = $color2
  resize_on_border = true
  layout = dwindle
}

decoration {
  rounding = 10
  active_opacity = 0.9
  inactive_opacity = 0.8
  shadow {
      enabled = true
      range = 4
      render_power = 3
      color = rgba(1a1a1aee)
  }
  blur {
      enabled = true
      size = 3
      passes = 5
  }
}

animations {
  enabled = yes
  bezier = easeOutQuint,0.23,1,0.32,1
  bezier = quick,0.15,0,0.1,1
  animation = windows, 1, 4, easeOutQuint
  animation = border, 1, 5, default
  animation = fade, 1, 3, default
  animation = workspaces, 1, 4, quick, slide
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  vfr = true
}

input {
  kb_layout = latam
  follow_mouse = 1
  sensitivity = 0
  touchpad {
      natural_scroll = true
  }
}

