source = $HOME/.cache/wal/colors-hyprland.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# --- FONDO DE PANTALLA ---
background {
    monitor =
    # OPCIÓN A: Usar captura de pantalla borrosa (Lo que tenías antes)
    # path = screenshot
    
    # OPCIÓN B: Usar una imagen fija (RECOMENDADO - Cambia la ruta)
    path = /home/franco/Descargas/mi_wallpaper.jpg

    color = $background
    blur_passes = 2
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

# --- FOTO DE PERFIL (AVATAR) ---
image {
    monitor =
    # Cambia esto por una foto tuya cuadrada o png (aprox 120x120)
    path = /home/franco/face.png 
    size = 120
    border_color = $color12
    border_size = 3
    position = 0, 70
    halign = center
    valign = center
}

# --- CAMPO DE CONTRASEÑA ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = $color12
    inner_color = rgba(0, 0, 0, 0.6)
    font_color = $foreground
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 20    # Bordes más redondeados
    check_color = $color11
    fail_color = rgb(180, 50, 50)
    fail_text = <i>Falló <b>($ATTEMPTS)</b></i>
    position = 0, -60
    halign = center
    valign = center
}

# --- RELOJ ---
label {
    monitor =
    # Usamos date porque $TIME a veces falla en hyprlock
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $color12
    font_size = 85
    font_family = JetBrainsMono Nerd Font Propo ExtraBold
    position = 0, 220
    halign = center
    valign = center
    shadow_passes = 2
}

# --- FECHA ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d de %B")"
    color = $foreground
    font_size = 20
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 160
    halign = center
    valign = center
}